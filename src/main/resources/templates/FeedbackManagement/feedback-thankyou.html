<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DineElite — Thank You</title>
<th:block th:replace="~{fragments/site-theme :: site-head}"></th:block>
<style>
  .topbar { background: #0B1120;
  }
  .btn-primary { background: #6366F1; color: white; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; transition: background 0.2s, transform 0.2s; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .btn-primary:hover { background: #1E293B; transform: translateY(-1px); }
  .btn-outline { border: 1.5px solid #E2E8F0; background: white; color: #0B1120; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; transition: background 0.2s, border-color 0.2s; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .btn-outline:hover { border-color: #6366F1; background: #F8FAFC; }
  .fade-in { animation: fadeUp 0.6s ease both; }
  .fade-in-delay { animation: fadeUp 0.6s ease 0.15s both; }
  .fade-in-delay-2 { animation: fadeUp 0.6s ease 0.3s both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .star-icon { color: #22D3EE; font-size: 2.5rem; line-height: 1; }
  .divider { width: 48px; height: 2px; background: #22D3EE;
  }
</style>
  <th:block th:replace="~{fragments/site-responsive :: site-responsive}"></th:block>
</head>
<body class="min-h-screen flex flex-col">

<!-- TOP NAV -->
<nav class="topbar flex items-center justify-between px-8 py-4">
  <a th:href="@{/}" href="#" class="font-display text-2xl text-white">Dine<span style="color:#22D3EE">Elite</span></a>
  <div class="flex items-center gap-6">
    <a th:href="@{/customer-booking-records}" class="text-gray-400 text-sm font-body hover:text-yellow-400 transition-colors">My Bookings</a>
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:#6366F1;" th:text="${firstLetter}">J</div>
      <a class="text-gray-300 text-sm font-body cursor-pointer" th:text="${customerFullName}" th:href="@{/customer-profile-view}">Jane Doe</a>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="flex-1 flex items-center justify-center px-6 py-16">
  <div class="max-w-lg w-full text-center">

    <!-- Star badge -->
    <div class="fade-in flex items-center justify-center mb-8">
      <div class="w-24 h-24 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, #22D3EE 0%, #6366F1 100%);">
        <span class="star-icon" style="color:white; font-size:2.8rem;">★</span>
      </div>
    </div>



    <!-- Heading -->
    <div class="fade-in-delay mb-6">
      <div class="divider mx-auto mb-5"></div>
      <h1 class="font-display text-5xl text-charcoal mb-3">Thank You!</h1>
      <p class="font-accent italic text-2xl" style="color:#22D3EE;">Review Submitted</p>
    </div>

    <!-- Message -->
    <div class="fade-in-delay-2">
      <p class="text-muted font-body text-base leading-relaxed mb-2">
        Your feedback helps other diners discover great experiences at
      </p>
      <p class="font-display text-xl text-charcoal mb-8" th:text="${feedback.restaurant.restaurantName}">Ember &amp; Oak</p>

      <!-- Decorative rating summary strip -->
      <div class="bg-white rounded-lg px-6 py-5 mb-10 flex items-center justify-center gap-3" style="border: 1px solid #E2E8F0;">
        <span class="text-sm font-body text-muted">Your review is now live</span>
        <span class="text-xs font-body font-bold px-3 py-1 rounded-full" style="background:rgba(122,140,110,0.12); color:#34D399;">Verified Diner</span>
      </div>

      <!-- CTA buttons -->
      <div class="flex flex-col sm:flex-row gap-3">
        <a th:href="@{/customer-booking-records}"
           class="btn-outline flex-1 py-4 rounded-sm text-center block">
          My Bookings
        </a>
        <a th:href="@{/customer-my-reviews}"
           class="btn-outline flex-1 py-4 rounded-sm text-center block">
          My Reviews
        </a>
        <a th:href="@{/restaurant-listing}"
           class="btn-primary flex-1 py-4 rounded-sm text-center block">
          Explore More Restaurants

        </a>
      </div>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer class="py-6 text-center">
  <p class="text-xs font-body" style="color:#B0A89E;">© 2026 DineElite ·
    <a href="#" class="hover:underline" style="color:#B0A89E;">Privacy</a> · <a href="#" class="hover:underline" style="color:#B0A89E;">Terms</a>
  </p>
</footer>


</body>
</html>
