<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Shared responsive CSS for customer, owner, and public pages (Tailwind + custom layouts).
  Include once per page in <head>. Frontend-only — no backend changes.
-->
<th:block th:fragment="site-responsive">
  <style>
    html {
      overflow-x: hidden;
    }

    body {
      overflow-x: hidden;
      max-width: 100vw;
    }

    img, video, svg {
      max-width: 100%;
      height: auto;
    }

    /* ── Top navigation ── */
    nav.topbar,
    nav.bg-charcoal,
    .topbar {
      flex-wrap: wrap;
      gap: 12px;
    }

    @media (max-width: 768px) {
      nav.topbar,
      nav.bg-charcoal,
      nav[class*="px-8"],
      nav[class*="px-10"] {
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }

      nav .font-display.text-2xl,
      nav .font-display.text-3xl {
        font-size: 1.35rem !important;
      }

      nav .text-gray-300.text-sm.font-body,
      nav .hidden.md\:flex .text-gray-300 {
        font-size: 0.75rem;
      }
    }

    /* Show desktop nav links on small screens (wrap instead of hide) */
    @media (max-width: 767px) {
      nav .hidden.md\:flex.items-center {
        display: flex !important;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
        width: 100%;
        justify-content: flex-end;
      }
    }

    /* ── Profile / owner page wrappers (sidebar + main) ── */
    .max-w-6xl.mx-auto.px-6.py-10.flex,
    .max-w-6xl.mx-auto.flex.gap-8,
    .max-w-7xl.mx-auto.px-6.py-10.flex {
      min-width: 0;
    }

    @media (max-width: 900px) {
      .max-w-6xl.mx-auto.px-6.py-10.flex,
      .max-w-6xl.mx-auto.flex,
      .max-w-7xl.mx-auto.px-6.py-10.flex {
        flex-direction: column !important;
        gap: 1.25rem !important;
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }

      aside.profile-sidebar,
      aside.flex-col.w-56,
      aside.w-56 {
        width: 100% !important;
        max-width: 100%;
      }

      main.flex-1 {
        width: 100%;
        min-width: 0;
      }
    }

    /* ── Custom layout (e.g. customer-my-reviews) ── */
    .layout {
      min-width: 0;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column !important;
        padding: 1rem !important;
        gap: 1rem !important;
      }

      .layout .sidebar {
        width: 100% !important;
      }

      .layout .main-content,
      .layout main {
        width: 100%;
        min-width: 0;
      }
    }

    /* ── Split auth panels (sign-in, register) ── */
    @media (max-width: 1024px) {
      body.min-h-screen.flex {
        flex-direction: column;
      }

      .left-panel {
        width: 100% !important;
        min-height: auto;
        padding: 2.5rem 1.5rem !important;
      }

      .left-panel.hidden.lg\:flex {
        display: flex !important;
      }
    }

    @media (max-width: 480px) {
      .left-panel h2,
      .left-panel .text-5xl {
        font-size: 2rem !important;
        line-height: 1.2 !important;
      }
    }

    /* ── Stat / filter grids ── */
    @media (max-width: 768px) {
      .grid.grid-cols-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      .grid.grid-cols-2.md\:grid-cols-3 {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }
    }

    @media (max-width: 480px) {
      .grid.grid-cols-4 {
        grid-template-columns: 1fr !important;
      }

      .grid.grid-cols-2.md\:grid-cols-3 {
        grid-template-columns: 1fr !important;
      }
    }

    /* ── Restaurant cards (horizontal image + body) ── */
    @media (max-width: 640px) {
      .restaurant-card.flex {
        flex-direction: column !important;
      }

      .restaurant-card .card-image {
        width: 100% !important;
        min-width: 100% !important;
        min-height: 120px !important;
        height: auto !important;
      }
    }

    /* ── Schedule rows (restaurant register / edit) ── */
    @media (max-width: 640px) {
      .schedule-row {
        grid-template-columns: 44px 1fr !important;
        gap: 10px !important;
      }

      .schedule-row .time-block,
      .schedule-row .closed-banner {
        grid-column: 1 / -1;
      }

      .quick-btn {
        font-size: 0.7rem;
        padding: 6px 10px;
      }

      .duration-pill {
        min-width: calc(50% - 8px);
      }

      .dur-pill {
        flex: 1 1 72px;
        min-width: 72px;
      }
    }

    @media (max-width: 900px) {
      .max-w-5xl.mx-auto.px-6.py-6.flex {
        flex-direction: column !important;
        gap: 1.5rem !important;
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }
    }

    /* ── Tables & wide content ── */
    .table-wrap,
    .table-responsive {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media (max-width: 768px) {
      table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        max-width: 100%;
      }

      .overflow-x-auto {
        -webkit-overflow-scrolling: touch;
      }
    }

    /* ── Forms & cards ── */
    @media (max-width: 768px) {
      .bg-white.rounded-lg.p-8,
      .bg-white.rounded-lg.p-6 {
        padding: 1.25rem !important;
      }

      .flex.items-center.justify-between.mb-6,
      .flex.items-start.justify-between {
        flex-wrap: wrap;
        gap: 12px;
      }

      .hero-bg h1,
      .font-display.text-5xl,
      .font-display.text-6xl {
        font-size: clamp(1.75rem, 8vw, 3rem) !important;
      }
    }

    /* ── Modals (support, feedback, reviews) ── */
    @media (max-width: 600px) {
      .modal-overlay,
      [id*="modal"],
      .modal-backdrop {
        padding: 12px !important;
        align-items: flex-start !important;
      }

      .modal-box,
      .modal-content,
      .modal-panel,
      .modal {
        width: 100% !important;
        max-width: calc(100vw - 24px) !important;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
      }
    }

    /* ── Seat / reservation layouts ── */
    @media (max-width: 900px) {
      .seat-layout,
      .booking-layout,
      .two-panel {
        flex-direction: column !important;
      }

      .slot-grid {
        grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)) !important;
      }
    }

    /* ── Restaurant listing / detail hero ── */
    @media (max-width: 768px) {
      .restaurant-hero,
      .detail-hero {
        flex-direction: column !important;
        align-items: flex-start !important;
      }

      .filter-bar,
      .filter-tabs {
        flex-wrap: wrap;
        gap: 8px;
      }
    }

    /* ── Edit admin & standalone nav pages ── */
    @media (max-width: 768px) {
      nav.bg-charcoal.px-10 {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 12px;
      }
    }
  </style>
</th:block>
</body>
</html>
