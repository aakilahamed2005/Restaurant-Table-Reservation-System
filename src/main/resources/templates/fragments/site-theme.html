<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Shared futuristic theme for customer, owner, and public pages.
  Include once per page in <head>. Frontend-only — no backend changes.
-->
<th:block th:fragment="site-head">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#F8FAFC',
            surface: '#EEF2FF',
            charcoal: '#0B1120',
            'warm-brown': '#1E293B',
            terracotta: '#6366F1',
            gold: '#22D3EE',
            sage: '#34D399',
            muted: '#64748B'
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['"Plus Jakarta Sans"', 'sans-serif'],
            accent: ['Outfit', 'sans-serif']
          },
          boxShadow: {
            glow: '0 0 40px rgba(99, 102, 241, 0.15)',
            card: '0 8px 32px rgba(15, 23, 42, 0.08)'
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --cream: #F8FAFC;
      --surface: #EEF2FF;
      --charcoal: #0B1120;
      --warm-brown: #1E293B;
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --accent: #22D3EE;
      --accent-violet: #8B5CF6;
      --sage: #34D399;
      --muted: #64748B;
      --border: #E2E8F0;
      --border-soft: rgba(226, 232, 240, 0.8);
      --card: rgba(255, 255, 255, 0.92);
      --glass: rgba(255, 255, 255, 0.08);
      --shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 20px 60px rgba(15, 23, 42, 0.12);
      --gradient-hero: linear-gradient(135deg, #0B1120 0%, #1E293B 35%, #312E81 70%, #4338CA 100%);
      --gradient-primary: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #22D3EE 100%);
      --gradient-surface: linear-gradient(180deg, #F8FAFC 0%, #EEF2FF 100%);
      --gradient-nav: linear-gradient(90deg, rgba(11, 17, 32, 0.97) 0%, rgba(30, 41, 59, 0.97) 100%);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--gradient-surface);
      background-attachment: fixed;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--charcoal);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
      50% { box-shadow: 0 0 40px rgba(34, 211, 238, 0.4); }
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .fade-in { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .fade-in-delay-1 { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both; }
    .fade-in-delay-2 { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both; }
    .fade-in-delay-3 { animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both; }

    /* ── Layout helpers ── */
    .hero-bg {
      background: var(--gradient-hero);
      background-size: 200% 200%;
      animation: gradient-shift 12s ease infinite;
      position: relative;
      overflow: hidden;
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99, 102, 241, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(34, 211, 238, 0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: var(--gradient-primary);
      border-radius: 2px;
    }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--gradient-primary);
      background-size: 200% auto;
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      transition: background-position 0.4s ease, transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
    }

    .btn-primary:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.45);
    }

    .btn-outline {
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 10px;
      background: transparent;
      backdrop-filter: blur(8px);
      transition: all 0.25s ease;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: white;
      transform: translateY(-2px);
    }

    /* ── Cards ── */
    .card-hover {
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      backdrop-filter: blur(12px);
    }

    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(99, 102, 241, 0.2);
    }

    /* ── Navigation ── */
    .nav-link {
      transition: color 0.2s ease;
      position: relative;
    }

    .nav-link:hover { color: var(--accent); }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gradient-primary);
      transition: width 0.25s ease;
      border-radius: 1px;
    }

    .nav-link:hover::after { width: 100%; }

    /* ── Forms ── */
    .input-field {
      border: 1.5px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      background: white;
      border-radius: 10px;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .left-panel {
      background: var(--gradient-hero);
      background-size: 200% 200%;
      animation: gradient-shift 15s ease infinite;
      transition: background 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(34, 211, 238, 0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .left-panel.partner-mode {
      background: linear-gradient(160deg, #0B1120 0%, #1E293B 50%, #312E81 100%);
      background-size: 200% 200%;
    }

    /* ── Search ── */
    .search-box {
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-soft);
    }

    /* ── Glass panels ── */
    .glass-panel {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    /* ── Tab bars (sign-in etc.) ── */
    .signin-tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .signin-tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: all 0.25s ease;
      font-family: 'Plus Jakarta Sans', sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .signin-tab-btn:hover { color: var(--charcoal); }

    /* ── Shared page chrome (listing, profiles, etc.) ── */
    .site-topbar {
      background: rgba(11, 17, 32, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .brand-accent {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .chip {
      padding: 6px 16px;
      border-radius: 999px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.22s ease;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--muted);
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
    }

    .chip.active {
      background: var(--charcoal);
      color: white;
      border-color: var(--charcoal);
    }

    .chip.cuisine-active {
      background: var(--gradient-primary);
      color: white;
      border-color: transparent;
    }

    .rest-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-soft);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
    }

    .rest-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(99, 102, 241, 0.2);
    }
  </style>
</th:block>
</body>
</html>
