<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="ownerSidebar(activeTab, displayName, firstLetter)"
       class="profile-sidebar flex flex-col w-full md:w-56 gap-1 flex-shrink-0">
  <div class="bg-white rounded-lg p-5 mb-4 flex flex-col items-center text-center">
    <div class="avatar mb-3"
         style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#C4633A,#D4A853);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:2rem;color:white;"
         th:text="${firstLetter}">J</div>
    <p class="font-display text-lg text-charcoal" th:text="${displayName}">John Doe</p>
    <p class="text-xs text-muted font-body mt-1">Restaurant Owner</p>
  </div>
  <p class="sidebar-section-label" style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#8A7E78;padding:8px 16px 4px;">Account</p>
  <a th:href="@{/owner-profile-view}"
     th:class="${activeTab == 'profile'} ? 'sidebar-link active' : 'sidebar-link'"
     style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#8A7E78;text-decoration:none;">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    My Profile
  </a>
  <a th:href="@{/owner-profile-edit}"
     th:class="${activeTab == 'edit'} ? 'sidebar-link active' : 'sidebar-link'"
     style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#8A7E78;text-decoration:none;">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
    Edit Profile
  </a>
  <p class="sidebar-section-label mt-2" style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#8A7E78;padding:8px 16px 4px;">Restaurants</p>
  <a th:href="@{/restaurant-register}"
     th:class="${activeTab == 'register'} ? 'sidebar-link active' : 'sidebar-link'"
     style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#8A7E78;text-decoration:none;">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    Add Restaurant
  </a>
  <a th:href="@{/owner-restaurants}"
     th:class="${activeTab == 'restaurants'} ? 'sidebar-link active' : 'sidebar-link'"
     style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#8A7E78;text-decoration:none;">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 6h18M9 14h6m-9 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
    My Restaurants
  </a>
  <a href="#" id="openProfileSupportModal"
     class="sidebar-link"
     style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#8A7E78;text-decoration:none;">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
    Contact Support
  </a>
  <div class="mt-4 pt-4 border-t border-gray-100">
    <a th:href="@{/owner-profile-delete}"
       th:class="${activeTab == 'delete'} ? 'sidebar-link active' : 'sidebar-link'"
       th:style="${activeTab == 'delete'} ? 'display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#C4633A;text-decoration:none;border-left:3px solid #C4633A;font-weight:700;' : 'display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#C4633A;text-decoration:none;'">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      Deactivate Account
    </a>
    <a th:href="@{/user-logout}" class="sidebar-link" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:6px;font-size:0.875rem;color:#ef4444;text-decoration:none;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Sign Out
    </a>
  </div>
</aside>
</body>
</html>
