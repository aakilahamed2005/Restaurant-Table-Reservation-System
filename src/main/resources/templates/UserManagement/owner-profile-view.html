<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DineElite — Owner - My Profile</title>
  <th:block th:replace="~{fragments/site-theme :: site-head}"></th:block>
<style>
    
    .topbar { background: #0B1120; }
    .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 6px; font-family: 'Plus Jakarta Sans'; font-size: 0.875rem; color: #64748B; transition: all 0.2s; cursor: pointer; text-decoration: none; }
    .sidebar-link:hover { background: #F8FAFC; color: #0B1120; }
    .sidebar-link.active { background: #F8FAFC; border-left: 3px solid #6366F1; color: #6366F1; font-weight: 700; padding-left: 13px; }
    .sidebar-section-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #64748B; padding: 8px 16px 4px; }
    
    
    .btn-outline { border: 1.5px solid #6366F1; color: #6366F1; font-family: 'Plus Jakarta Sans'; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; transition: all 0.2s; }
    .btn-outline:hover { background: #6366F1; color: white; }
    .info-row { display: flex; flex-direction: column; gap: 4px; padding: 16px 0; border-bottom: 1px solid #EEF2FF; }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748B; }
    .info-value { font-size: 0.95rem; color: #0B1120; font-weight: 400; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #1E293B, #22D3EE); display: flex; align-items: center; justify-content: center; font-family: 'Outfit'; font-size: 2rem; color: white; }
    .stat-card { background: white; border-radius: 8px; }
  </style>
  <th:block th:replace="~{fragments/site-responsive :: site-responsive}"></th:block>
</head>
<body class="min-h-screen">

<!-- TOP NAV -->
<nav class="topbar flex items-center justify-between px-8 py-4">
  <a th:href="@{/}" class="font-display text-2xl text-white tracking-tight">Dine<span style="color:#22D3EE">Elite</span></a>
  <div class="flex items-center gap-6">
    <a th:href="@{/restaurant-listing}" class="text-gray-300 text-sm font-body hover:text-gold transition-colors">Explore</a>
    <div class="flex items-center gap-2 cursor-pointer">
      <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:#1E293B;" th:text="${firstLetter}">J</div>
      <span class="text-gray-300 text-sm font-body" th:text="${userFullName}">John Doe</span>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-6 py-10 flex gap-8">

  <div th:replace="~{UserManagement/fragments/owner-profile-sidebar :: ownerSidebar('profile', ${userFullName}, ${firstLetter})}"></div>

  <!-- MAIN -->
  <main class="flex-1">

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
      <div class="stat-card p-5 text-center">
        <p class="font-display text-3xl text-terracotta" th:text="${totalRestaurants}">3</p>
        <p class="text-xs text-muted font-body mt-1 uppercase tracking-wide">Restaurants</p>
      </div>
      <div class="stat-card p-5 text-center">
        <p class="font-display text-3xl text-charcoal" th:text="${avgRating}">4.7</p>
        <p class="text-xs text-muted font-body mt-1 uppercase tracking-wide">Avg Rating</p>
      </div>
    </div>

    <!-- Profile Details Card -->
    <div class="bg-white rounded-lg p-8 mb-6">
      <div class="flex items-center justify-between mb-6">
        <div>
          <div class="w-10 h-0.5 bg-gold mb-3"></div>
          <h2 class="font-display text-2xl text-charcoal">Owner Information</h2>
          <p class="text-muted text-sm font-body mt-1">Your account details at a glance</p>

          <div th:if="${successMessage}" class="bg-green-100 text-green-700 px-4 py-3 rounded mb-4 mt-4">
            <span th:text="${successMessage}"></span>
          </div>
        </div>
        <a th:href="@{/owner-profile-edit}" class="btn-primary px-5 py-2 rounded-sm">Edit Profile</a>
      </div>

      <div class="grid md:grid-cols-2 gap-x-12">
        <div>
          <div class="info-row">
            <span class="info-label">First Name</span>
            <span class="info-value" th:text="${userFirstName}">John</span>
          </div>
          <div class="info-row">
            <span class="info-label">Last Name</span>
            <span class="info-value" th:text="${userLastName}">Doe</span>
          </div>
          <div class="info-row">
            <span class="info-label">Email Address</span>
            <span class="info-value" th:text="${userEmail}">john.doe@example.com</span>
          </div>
        </div>
        <div>
          <div class="info-row">
            <span class="info-label">Phone Number</span>
            <span class="info-value" th:text="${userPhoneNumber}">+94 77 123 4567</span>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div th:replace="~{UserManagement/fragments/support-contact-modal :: supportContactModal(${userEmail}, 'openProfileSupportModal')}"></div>
</body>
</html>
