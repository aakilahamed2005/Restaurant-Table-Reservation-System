<!DOCTYPE html>
<!-- Shared admin layout CSS (sidebar, main, cards, tables). Pulls in admin-responsive for breakpoints. -->
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="admin-style">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>

    :root{
      --cream:#F8FAFC;
      --surface:#EEF2FF;
      --charcoal:#0B1120;
      --warm-brown:#1E293B;
      --terracotta:#6366F1;
      --gold:#22D3EE;
      --sage:#34D399;
      --muted:#64748B;

      --card:rgba(255,255,255,0.95);
      --border:#E2E8F0;
      --shadow:0 8px 32px rgba(15,23,42,0.08);
      --gradient-sidebar:linear-gradient(180deg, #0B1120 0%, #1E293B 50%, #312E81 100%);
      --gradient-accent:linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #22D3EE 100%);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer-bar {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:linear-gradient(180deg, #EEF2FF 0%, #F8FAFC 100%);
      background-attachment:fixed;
      font-family:'Plus Jakarta Sans',sans-serif;
      color:var(--charcoal);
      min-height:100vh;
      display:flex;
      -webkit-font-smoothing:antialiased;
    }

    .sidebar{
      width:260px;
      height:100vh;
      max-height:100vh;
      transition:width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      background:var(--gradient-sidebar);
      display:flex;
      flex-direction:column;
      position:fixed;
      top:0;
      left:0;
      overflow:hidden;
      box-shadow:4px 0 24px rgba(15,23,42,0.15);
    }

    .sidebar::before {
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(ellipse 60% 40% at 0% 100%, rgba(99,102,241,0.2) 0%, transparent 60%);
      pointer-events:none;
    }

    .sidebar-logo{
      padding:28px 24px 20px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:relative;
      z-index:1;
    }

    .brand{
      font-family:'Outfit',sans-serif;
      font-size:1.8rem;
      font-weight:700;
      color:white;
      letter-spacing:-0.02em;
    }

    .brand span{
      background:var(--gradient-accent);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    .badge-text{
      font-size:0.7rem;
      color:rgba(255,255,255,0.5);
      letter-spacing:0.15em;
      text-transform:uppercase;
      margin-top:4px;
    }

    .sidebar-nav{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:20px 0;
      position:relative;
      z-index:1;
    }

    .nav-section-title{
      font-size:0.65rem;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.4);
      padding:18px 24px 8px;
      font-weight:700;
    }

    .nav-item{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 24px;
      color:rgba(255,255,255,0.55);
      text-decoration:none;
      transition:all 0.25s ease;
      border-left:3px solid transparent;
      margin:2px 0;
    }

    .nav-item:hover{
      color:white;
      background:rgba(255,255,255,0.06);
      transform:translateX(2px);
    }

    .nav-item.active{
      color:white;
      background:rgba(99,102,241,0.2);
      border-left-color:var(--gold);
      box-shadow:inset 0 0 20px rgba(99,102,241,0.1);
    }

    .sidebar-footer{
      flex-shrink:0;
      padding:12px 24px 14px;
      border-top:1px solid rgba(255,255,255,0.08);
      position:relative;
      z-index:1;
    }

    .admin-info{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .admin-avatar{
      width:38px;
      height:38px;
      border-radius:50%;
      background:var(--gradient-accent);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      box-shadow:0 4px 12px rgba(99,102,241,0.4);
    }

    .admin-name{
      color:white;
      font-size:0.9rem;
      font-weight:700;
    }

    .admin-role{
      color:rgba(255,255,255,0.5);
      font-size:0.7rem;
      letter-spacing:0.08em;
    }

    .admin-sign-out{
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      padding:12px 16px;
      border-radius:10px;
      color:#F87171;
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:0.875rem;
      font-weight:500;
      letter-spacing:0;
      text-transform:none;
      text-decoration:none;
      transition:background 0.25s, color 0.25s, transform 0.2s;
      cursor:pointer;
    }

    .admin-sign-out:hover{
      background:rgba(248,113,113,0.12);
      color:#FCA5A5;
      transform:translateX(2px);
    }

    .admin-sign-out svg{
      flex-shrink:0;
    }

    .search-input,
    .filter-select,
    .date-input{
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:0.85rem;
      color:var(--charcoal);
      border-radius:10px;
      border:1.5px solid var(--border);
      transition:border-color 0.2s, box-shadow 0.2s;
    }

    .filter-select,
    .date-input{
      cursor:pointer;
    }

    .filter-select:focus,
    .search-input:focus,
    .date-input:focus{
      outline:none;
      border-color:var(--terracotta);
      box-shadow:0 0 0 4px rgba(99,102,241,0.12);
    }

    .main{
      margin-left:260px;
      flex:1;
      min-height:100vh;
      transition:margin-left 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      animation:fadeIn 0.4s ease;
    }

    body.admin-sidebar-collapsed .main{
      margin-left:14px;
    }

    .topbar{
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:18px 32px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 1px 0 rgba(15,23,42,0.04);
    }

    .topbar-title{
      font-family:'Outfit',sans-serif;
      font-size:1.7rem;
      font-weight:700;
      letter-spacing:-0.02em;
    }

    .topbar-sub{
      color:var(--muted);
      margin-top:4px;
      font-size:0.85rem;
    }

    .content{
      padding:32px;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .topbar-btn{
      border:1px solid var(--border);
      background:white;
      border-radius:10px;
      width:40px;
      height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      color:var(--charcoal);
      transition:all 0.25s ease;
    }

    .topbar-btn:hover{
      background:var(--surface);
      border-color:var(--terracotta);
      transform:translateY(-1px);
      box-shadow:0 4px 12px rgba(99,102,241,0.15);
    }

    .topbar-signout{
      color:#EF4444;
      border-color:rgba(239,68,68,0.3);
      background:rgba(254,226,226,0.5);
    }

    .topbar-signout:hover{
      background:#EF4444;
      color:white;
      border-color:#EF4444;
    }

    .topbar-signout svg{
      stroke:#EF4444;
    }

    .topbar-signout:hover svg{
      stroke:white;
    }

    .notif-dot{
      width:8px;
      height:8px;
      background:#EF4444;
      border-radius:50%;
      position:absolute;
      top:10px;
      right:10px;
      animation:shimmer-bar 2s ease infinite;
    }

    .notif-dot.is-hidden{
      display:none;
    }

    .admin-notif-wrap{
      position:relative;
    }

    .admin-notif-panel{
      position:absolute;
      top:48px;
      right:0;
      width:min(420px, calc(100vw - 48px));
      max-height:min(520px, 70vh);
      overflow:auto;
      background:var(--card);
      backdrop-filter:blur(16px);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      z-index:200;
      display:none;
      animation:fadeIn 0.25s ease;
    }

    .admin-notif-panel.is-open{
      display:block;
    }

    .admin-notif-head{
      padding:0;
      border-bottom:none;
      font-size:0.75rem;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .admin-notif-head-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      background:var(--cream);
    }

    .admin-notif-toolbar{
      display:flex;
      align-items:center;
      gap:6px;
      flex-shrink:0;
    }

    .admin-notif-action{
      width:28px;
      height:28px;
      border:none;
      border-radius:8px;
      background:var(--surface);
      color:var(--charcoal);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      line-height:1;
      transition:background 0.2s, color 0.2s, transform 0.15s;
    }

    .admin-notif-action:hover{
      background:var(--terracotta);
      color:white;
      transform:scale(1.05);
    }

    .admin-notif-list{
      max-height:min(460px, 60vh);
      overflow:auto;
    }

    .admin-notif-item{
      position:relative;
      padding:14px 40px 14px 16px;
      border-bottom:1px solid var(--border);
      cursor:pointer;
      text-align:left;
      transition:background 0.2s;
    }

    .admin-notif-item:last-child{
      border-bottom:none;
    }

    .admin-notif-item:hover{
      background:var(--surface);
    }

    .admin-notif-item.is-unread{
      font-weight:700;
      background:rgba(99,102,241,0.04);
    }

    .admin-notif-item-title{
      font-size:0.85rem;
      padding-right:4px;
    }

    .admin-notif-item-delete{
      position:absolute;
      top:10px;
      right:10px;
      width:22px;
      height:22px;
      border:none;
      border-radius:6px;
      background:var(--surface);
      color:var(--muted);
      cursor:pointer;
      font-size:15px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:background 0.2s, color 0.2s;
    }

    .admin-notif-item-delete:hover{
      background:rgba(239,68,68,0.1);
      color:#EF4444;
    }

    .admin-notif-meta{
      font-size:0.72rem;
      color:var(--muted);
      margin-top:4px;
      font-weight:400;
    }

    .admin-notif-body{
      font-size:0.85rem;
      margin-top:8px;
      white-space:pre-wrap;
      font-weight:400;
    }

    .admin-notif-empty{
      padding:20px 16px;
      font-size:0.85rem;
      color:var(--muted);
    }

    /* Dashboard & management page components */
    .tab-bar{display:flex;gap:4px;background:rgba(255,255,255,0.7);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;width:fit-content;}
    .tab{padding:8px 20px;border-radius:8px;font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--muted);transition:all 0.25s ease;font-family:'Plus Jakarta Sans',sans-serif;}
    .tab.active{background:var(--gradient-accent);color:white;box-shadow:0 4px 16px rgba(99,102,241,0.3);}

    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
    .stat-card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:20px 22px;position:relative;overflow:hidden;transition:transform 0.25s ease,box-shadow 0.25s ease;}
    .stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(99,102,241,0.12);}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient-accent);}
    .stat-card.gold::before{background:var(--gold);}
    .stat-card.sage::before{background:var(--sage);}
    .stat-card.brown::before{background:var(--warm-brown);}
    .stat-label{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .stat-value{font-family:'Outfit',sans-serif;font-size:2rem;color:var(--charcoal);line-height:1;}
    .stat-change{font-size:0.72rem;color:var(--sage);margin-top:6px;display:flex;align-items:center;gap:4px;}
    .stat-change.down{color:#DC2626;}
    .stat-icon{position:absolute;bottom:16px;right:16px;opacity:0.08;}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
    .grid-3{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}

    .card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.25s ease;}
    .card:hover{box-shadow:0 12px 40px rgba(99,102,241,0.08);}
    .card-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .card-title{font-family:'Outfit',sans-serif;font-size:1rem;color:var(--charcoal);}
    .card-sub{font-size:0.72rem;color:var(--muted);margin-top:2px;}
    .card-body{padding:18px 22px;}
    .view-all{font-size:0.72rem;color:var(--terracotta);font-weight:700;cursor:pointer;text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;}

    table{width:100%;border-collapse:collapse;font-size:0.82rem;}
    thead th{text-align:left;padding:10px 14px;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
    tbody td{padding:12px 14px;border-bottom:1px solid var(--surface);color:var(--charcoal);vertical-align:middle;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:var(--cream);}

    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:0.65rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
    .badge-green{background:#DCFCE7;color:#16A34A;}
    .badge-yellow{background:#FEF9C3;color:#CA8A04;}
    .badge-red{background:#FEE2E2;color:#DC2626;}
    .badge-blue{background:#DBEAFE;color:#2563EB;}
    .badge-gray{background:#F3F4F6;color:#6B7280;}

    .action-btn{padding:5px 12px;border-radius:4px;font-size:0.7rem;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.04em;transition:all 0.15s;}
    .btn-approve{background:#DCFCE7;color:#16A34A;}
    .btn-approve:hover{background:#16A34A;color:white;}
    .btn-reject{background:#FEE2E2;color:#DC2626;}
    .btn-reject:hover{background:#DC2626;color:white;}
    .btn-view{background:var(--surface);color:var(--charcoal);border:1px solid var(--border);}
    .btn-view:hover{background:var(--charcoal);color:white;}
    .btn-suspend{background:#FEF3C7;color:#D97706;}
    .btn-suspend:hover{background:#D97706;color:white;}
    .btn-delete{background:#FEE2E2;color:#DC2626;}
    .btn-delete:hover{background:#DC2626;color:white;}
    .action-group{display:flex;gap:6px;}

    .activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--surface);}
    .activity-item:last-child{border-bottom:none;}
    .activity-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
    .activity-text{font-size:0.8rem;color:var(--charcoal);line-height:1.4;}
    .activity-time{font-size:0.7rem;color:var(--muted);margin-top:2px;}

    .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .quick-btn{padding:14px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;text-align:left;transition:all 0.2s;font-family:'Plus Jakarta Sans',sans-serif;}
    .quick-btn:hover{border-color:var(--terracotta);background:var(--surface);}
    .quick-btn-icon{font-size:1.2rem;margin-bottom:6px;}
    .quick-btn-label{font-size:0.75rem;font-weight:700;color:var(--charcoal);display:block;}
    .quick-btn-sub{font-size:0.65rem;color:var(--muted);margin-top:2px;}

    .section{display:none;}
    .section.active{display:block;}

    .search-bar{display:flex;gap:10px;margin-bottom:20px;align-items:center;}
    .btn-primary{background:var(--gradient-accent);background-size:200% auto;color:white;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:0.08em;text-transform:uppercase;font-size:0.72rem;font-weight:700;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;transition:background-position 0.3s,transform 0.2s;box-shadow:0 4px 16px rgba(99,102,241,0.25);}
    .btn-primary:hover{background-position:right center;transform:translateY(-1px);}

    .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--surface);display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--muted);margin-right:8px;}

    .bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding:0 4px;}
    .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bar{width:100%;background:var(--terracotta);border-radius:3px 3px 0 0;opacity:0.85;transition:opacity 0.2s;cursor:pointer;}
    .bar:hover{opacity:1;}
    .bar-label{font-size:0.6rem;color:var(--muted);font-weight:700;}

    .page-header{margin-bottom:22px;}
    .page-title{font-family:'Outfit',sans-serif;font-size:1.5rem;color:var(--charcoal);}
    .page-sub{font-size:0.78rem;color:var(--muted);margin-top:4px;}

    /* Responsive rules live in admin-responsive fragment (included by each admin page). */

  </style>

  <th:block th:replace="~{AdminManagement/fragments/admin-responsive :: admin-responsive}"></th:block>

</th:block>

</html>
