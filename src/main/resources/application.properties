spring.application.name=restaurantTableReservation
# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_table_reservation_system_new


spring.datasource.username=root
spring.datasource.password=${mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Image uploading configs (restaurant forms have many fields + up to 10 images)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-http-form-post-size=200MB
server.tomcat.max-swallow-size=200MB
server.tomcat.max-part-count=-1

app.upload.customer-profile-images.dir=uploads/customer-profile-images/
app.upload.restaurant-images.dir=uploads/restaurant-images/


github.models.token=${GITHUB_TOKEN}
github.models.base-url=https://models.inference.ai.azure.com
github.models.model=gpt-4o-mini